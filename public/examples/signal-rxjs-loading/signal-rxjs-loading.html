<h1>rxjsloading with signal pagina</h1>

@if (!itemDtosWrappedWithLoadState().loaded) {
    <p>Loading items...</p>
}
@else {
    @for (item of itemDtosWrappedWithLoadState().items; track $index) {
        <p>{{item.name}}</p>
    }
}

<example-code
    title="Example code"
    [templatePath]="'/examples/signal-rxjs-loading/signal-rxjs-loading.html'"
    [componentPath]="'/examples/signal-rxjs-loading/signal-rxjs-loading.ts'"
></example-code>
