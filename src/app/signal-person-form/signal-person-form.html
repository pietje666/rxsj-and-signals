<section class="person-form">
	<h1>Person (model signals)</h1>
	<form (submit)="$event.preventDefault(); addPerson()">
		<input type="text" placeholder="First name" [(ngModel)]="firstName" name="firstName" />
		<input type="text" placeholder="Last name" [(ngModel)]="lastName" name="lastName" />
		<input type="number" placeholder="Age" [(ngModel)]="age" name="age" />
		<button type="submit">Add</button>
	</form>

	<p>{{ firstName() }} {{ lastName() }} ({{ age() }})</p>
	<ul>
		@for (person of people(); track $index) {
			<li>{{ person.firstName }} {{ person.lastName }} ({{ person.age }})</li>
		}
	</ul>
</section>

	title="Example code"
