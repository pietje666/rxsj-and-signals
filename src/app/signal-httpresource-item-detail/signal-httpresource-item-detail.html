<select [(ngModel)]='selectedItemId' (ngModelChange)="onSelect($event)">
    <option>empty</option>
    @for (item of items(); track $index) {
        <option [value]='item.id'>{{item.name}}</option>
    }
</select>
@if (itemDetails(); as itemDetail) {
    <h2>Details for {{itemDetail.name}}</h2>
    <p>Description: {{itemDetail.country}}</p>
    <p>Price: {{itemDetail.detail}}</p>
}

<example-code
    title="Example code"
    [templatePath]="'/app-source/signal-httpresource-item-detail/signal-httpresource-item-detail.html'"
    [componentPath]="'/app-source/signal-httpresource-item-detail/signal-httpresource-item-detail.ts'"
></example-code>
